<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="94"/>
    </clipPath>
  </defs>

  <!-- 左上：#E8CCC5 -->
  <rect x="6" y="6" width="94" height="94" fill="#E8CCC5" clip-path="url(#circle-clip)"/>

  <!-- 右上：#BDCED3 -->
  <rect x="100" y="6" width="94" height="94" fill="#BDCED3" clip-path="url(#circle-clip)"/>

  <!-- 左下：#CFD4AE -->
  <rect x="6" y="100" width="94" height="94" fill="#CFD4AE" clip-path="url(#circle-clip)"/>

  <!-- 右下：#F6E7C6 -->
  <rect x="100" y="100" width="94" height="94" fill="#F6E7C6" clip-path="url(#circle-clip)"/>

  <!-- 十字の境界線 -->
  <line x1="100" y1="6" x2="100" y2="194" stroke="#1a1a1a" stroke-width="2.5"/>
  <line x1="6" y1="100" x2="194" y2="100" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- 外枠の円 -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
</svg>
