# fly.toml app configuration file generated for omoide-manager on 2026-05-27T19:52:05+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'omoide-manager'
primary_region = 'nrt'
console_command = 'php /var/www/html/artisan tinker'

[build]
  [build.args]
    NODE_VERSION = '18'
    PHP_VERSION = '8.2'

[env]
  APP_NAME = '思い出マネージャー'
  APP_ENV = 'production'
  APP_DEBUG = 'false'
  APP_URL = 'https://omoide-manager.fly.dev'
  APP_LOCALE = 'ja'
  APP_FALLBACK_LOCALE = 'ja'
  APP_FAKER_LOCALE = 'ja_JP'
  LOG_CHANNEL = 'stderr'
  LOG_LEVEL = 'info'
  LOG_STDERR_FORMATTER = 'Monolog\Formatter\JsonFormatter'
  DB_CONNECTION = 'pgsql'
  SESSION_DRIVER = 'database'
  SESSION_SECURE_COOKIE = 'true'
  SESSION_LIFETIME = '120'
  FILESYSTEM_DISK = 'local'
  MAIL_MAILER = 'log'
  MAIL_FROM_ADDRESS = 'hello@example.com'
  MAIL_FROM_NAME = '思い出マネージャー'
  ASSET_URL = 'https://omoide-manager.fly.dev'
  CACHE_STORE = 'database'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[deploy]
  release_command = "sh -c 'php artisan migrate --force && php artisan db:seed --class=CategorySeeder --force'"
